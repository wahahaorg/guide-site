<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>导航站</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #555;
      --accent: #4f6ef7;
      --accent-light: #e8ecff;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-hover: 0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #4f6ef7 0%, #6c5ce7 100%);
      color: #fff;
      padding: 48px 24px 36px;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { margin-top: 8px; opacity: .85; font-size: 1rem; }

    /* Search */
    .search-wrap {
      max-width: 640px;
      margin: -24px auto 32px;
      padding: 0 16px;
      position: relative;
      z-index: 2;
    }
    .search-wrap input {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      background: var(--card-bg);
      box-shadow: var(--shadow);
      outline: none;
      transition: box-shadow .2s, border-color .2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,247,.15);
    }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px 64px; }

    .categories { display: flex; flex-direction: column; gap: 40px; }

    .category-title {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 16px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .category-title .icon { font-size: 1.3rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      transition: transform .15s, box-shadow .2s, border-color .2s;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .emoji { font-size: 1.15rem; }
    .card-desc {
      font-size: .87rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .card-tag {
      display: inline-block;
      margin-top: 8px;
      font-size: .75rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--accent-light);
      color: var(--accent);
      align-self: flex-start;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-secondary);
      font-size: .85rem;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    /* Empty state */
    .no-results {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-secondary);
    }
    .no-results.hidden { display: none; }

    @media (max-width: 640px) {
      header { padding: 36px 16px 28px; }
      header h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🧭 导航站</h1>
    <p>学习资源导航 · 全栈 · 出海 · Agent</p>
  </header>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="搜索站点名称或描述…" autocomplete="off" />
  </div>

  <div class="container">
    <div class="no-results hidden" id="noResults">没有匹配的站点，换个关键词试试？</div>
    <div class="categories" id="categories"></div>
  </div>

  <footer>
    Made with ❤️ · <a href="https://github.com/wahahaorg" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;">GitHub</a>
  </footer>

  <script>
    // ─── 数据 ────────────────────────────────────────────
    const CATEGORIES = [
      {
        name: '📚 学习资料',
        items: [
          { title: '全栈知识站', desc: 'Python · Go · Node.js · NestJS 全栈学习路径', tag: 'VitePress', url: 'https://wahahaorg.github.io/fullstack-road/' },
          { title: '出海游戏站', desc: '海外 SEO 游戏站从 0 到 1 搭建教程', tag: 'VitePress', url: 'https://wahahaorg.github.io/game-size/' },
          { title: 'Agent 开发', desc: 'LangChain · LangGraph · DeepAgents 学习笔记', tag: 'VitePress', url: 'https://wahahaorg.github.io/learn-fastgpt/' },
        ]
      }
    ];

    // ─── 渲染 ────────────────────────────────────────────
    const container = document.getElementById('categories');
    const searchInput = document.getElementById('search');
    const noResults = document.getElementById('noResults');

    function render(filter = '') {
      const q = filter.toLowerCase().trim();
      let hasAny = false;
      let html = '';

      for (const cat of CATEGORIES) {
        const filtered = cat.items.filter(item =>
          !q || item.title.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q)
        );
        if (filtered.length === 0) continue;
        hasAny = true;

        html += `<div class="category">
          <div class="category-title"><span class="icon">${cat.name}</span></div>
          <div class="grid">`;

        for (const item of filtered) {
          const url = item.url === '/' ? window.location.origin : item.url;
          html += `<a href="${url}" class="card" target="${item.url.startsWith('http') ? '_blank' : '_self'}" rel="noopener">
            <div class="card-title"><span class="emoji">${item.emoji || '🔗'}</span>${item.title}</div>
            <div class="card-desc">${item.desc}</div>
            ${item.tag ? `<span class="card-tag">${item.tag}</span>` : ''}
          </a>`;
        }

        html += `</div></div>`;
      }

      container.innerHTML = html;
      noResults.classList.toggle('hidden', hasAny);
    }

    searchInput.addEventListener('input', () => render(searchInput.value));

    // 初始渲染
    render();
  </script>
</body>
</html>
